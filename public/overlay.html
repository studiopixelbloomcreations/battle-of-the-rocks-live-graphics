<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Broadcast Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/overlay.css">
  <link rel="stylesheet" href="styles/overlay2.css">
  <link rel="stylesheet" href="styles/overlay3.css">
</head>
<body>
  <div id="graphics-container">
    <div id="intro-layer" class="graphic-layer hidden">
      <canvas id="intro-canvas"></canvas>
      <div class="intro-content">
        <div class="match-type" id="intro-match-type">T20 CRICKET</div>
        <div class="intro-shell">
          <div class="intro-stage-lights"></div>
          <div class="teams-container modern-intro">
            <div class="team-box team-left">
              <div class="team-logo circular-media team-logo-3d" id="intro-team1-logo"><span>MI</span></div>
            </div>
            <div class="intro-center-stack">
              <div class="intro-vs-rings">
                <span class="intro-ring ring-a"></span>
                <span class="intro-ring ring-b"></span>
                <span class="intro-ring ring-c"></span>
              </div>
              <div class="intro-team-name top" id="intro-team1-name">MUMBAI INDIANS</div>
              <div class="vs-badge">VS</div>
              <div class="intro-team-name bottom" id="intro-team2-name">CHENNAI SUPER KINGS</div>
            </div>
            <div class="team-box team-right">
              <div class="team-logo circular-media team-logo-3d" id="intro-team2-logo"><span>CSK</span></div>
            </div>
          </div>
          <div class="intro-meta-stack">
            <div class="intro-match-label" id="intro-match-label">MATCH 3</div>
            <div class="venue" id="intro-venue">LIVE FROM WANKHEDE STADIUM, MUMBAI</div>
          </div>
        </div>
      </div>
    </div>

    <div id="scorebug" class="graphic-layer">
      <div id="scorebug-root"></div>
    </div>

    <div id="full-scoreboard" class="graphic-layer hidden">
      <div class="scoreboard-backdrop"></div>
      <div id="full-scoreboard-root"></div>
    </div>

    <div id="batting-card" class="graphic-layer hidden">
      <div id="batting-card-root"></div>
    </div>

    <div id="player-stats" class="graphic-layer hidden">
      <div id="player-stats-root"></div>
    </div>

    <div id="bowler-stats" class="graphic-layer hidden">
      <div id="bowler-stats-root"></div>
    </div>

    <div id="match-summary" class="graphic-layer hidden">
      <div id="match-summary-root"></div>
    </div>

    <div id="team-comparison" class="graphic-layer hidden">
      <div id="team-comparison-root"></div>
    </div>

    <div id="lower-third" class="graphic-layer hidden">
      <div id="lower-third-root"></div>
    </div>

    <div id="wicket-animation" class="graphic-layer hidden">
      <canvas id="wicket-canvas"></canvas>
      <div class="wicket-shockring"></div>
      <div class="wicket-slash"></div>
      <div class="wicket-scene">
        <div class="stump-stack">
          <div class="stump"></div>
          <div class="stump"></div>
          <div class="stump"></div>
          <div class="bail bail-left"></div>
          <div class="bail bail-right"></div>
          <div class="wicket-ball-trail"></div>
          <div class="wicket-ball-impact"></div>
        </div>
      </div>
      <div class="wicket-content"><div class="wicket-kicker">BREAKTHROUGH</div><div class="wicket-text">WICKET!</div><div class="wicket-player" id="wicket-player">Rohit Sharma</div><div class="wicket-dismissal" id="wicket-dismissal">caught by fielder</div><div class="wicket-figures" id="wicket-figures">58 runs (32 balls)</div></div>
      <div class="wicket-burst"></div>
    </div>

    <div id="six-animation" class="graphic-layer hidden">
      <canvas id="six-canvas"></canvas>
      <div class="six-grid"></div>
      <div class="six-flight-scene">
        <div class="six-halo"></div>
        <div class="six-orbit-ring"></div>
        <div class="six-orbit-ring orbit-secondary"></div>
        <div class="six-ball-flight"></div>
        <div class="six-comet-tail"></div>
      </div>
      <div class="six-content"><div class="six-kicker">MAXIMUM</div><div class="six-number">6</div><div class="six-text">SIX!</div><div class="six-player" id="six-player">Rohit Sharma</div></div>
      <div class="six-particles" id="six-particles"></div>
    </div>

    <div id="four-animation" class="graphic-layer hidden">
      <canvas id="four-canvas"></canvas>
      <div class="four-scan"></div>
      <div class="four-streak-scene">
        <div class="four-lane lane-a"></div>
        <div class="four-lane lane-b"></div>
        <div class="four-lane lane-c"></div>
        <div class="four-lane lane-d"></div>
        <div class="four-ball-dash"></div>
        <div class="four-ball-dash dash-secondary"></div>
      </div>
      <div class="four-content"><div class="four-kicker">THREADS THE GAP</div><div class="four-number">4</div><div class="four-text">FOUR!</div><div class="four-player" id="four-player">Rohit Sharma</div></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/liquid-glass-ui.js"></script>
  <script src="js/overlay.js"></script>
</body>
</html>
